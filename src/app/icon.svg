<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    /* Light Mode (Coffee on Warm Sand) */
    .bg { fill: #f5f1ea; }
    .stroke { stroke: #4e3b32; }
    .sun { fill: #4e3b32; }

    /* Dark Mode (Warm Gold on Deep Espresso) */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #2b2725; }
      .stroke { stroke: #ead6bf; }
      .sun { fill: #ead6bf; }
    }
  </style>

  <!-- Dynamic Background -->
  <rect width="256" height="256" rx="56" class="bg" />
  
  <g fill="none" class="stroke" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Image Frame -->
    <rect x="44" y="44" width="168" height="168" rx="24" />
    
    <!-- Mountains -->
    <path d="M 44 180 L 104 100 L 144 148 L 176 110 L 212 155" />
    
    <!-- Sun -->
    <circle cx="156" cy="92" r="16" class="sun" stroke="none" />
  </g>
</svg>
